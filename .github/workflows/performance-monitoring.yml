name: Performance Monitoring with Grafana

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:

jobs:
  performance-check:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        working-directory: .
        run: npm ci
      
      - name: Build application
        working-directory: .
        run: npm run build
      
      - name: Run tests with coverage
        working-directory: .
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: frontend
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Send metrics to Grafana Cloud
        if: ${{ secrets.GRAFANA_API_TOKEN != '' }}
        run: |
          echo "Sending deployment metrics to Grafana..."
                
          # Determine build status
          BUILD_STATUS=1
                
          # Extract test coverage from coverage report
          COVERAGE=$(grep -o '"pct":[0-9.]*' ./coverage/coverage-summary.json 2>/dev/null | head -1 | cut -d':' -f2 || echo "0")
                
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "metrics": [
                {
                  "metric": "deployment_status",
                  "value": 1,
                  "timestamp": '$(date +%s)'000,
                  "labels": {
                    "environment": "${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}",
                    "branch": "${{ github.ref_name }}",
                    "commit": "${{ github.sha }}"
                  }
                },
                {
                  "metric": "build_success_rate",
                  "value": "'"$BUILD_STATUS"'",
                  "timestamp": '$(date +%s)'000,
                  "labels": {
                    "branch": "${{ github.ref_name }}",
                    "workflow": "${{ github.workflow }}"
                  }
                },
                {
                  "metric": "test_coverage_percent",
                  "value": "'"$COVERAGE"'",
                  "timestamp": '$(date +%s)'000,
                  "labels": {
                    "branch": "${{ github.ref_name }}",
                    "project": "coolbros"
                  }
                },
                {
                  "metric": "deployments_total",
                  "value": 1,
                  "timestamp": '$(date +%s)'000,
                  "labels": {
                    "environment": "${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}",
                    "status": "success"
                  }
                }
              ]
            }' \
            ${{ secrets.GRAFANA_API_URL }}/api/v1/import/prometheus || echo "Failed to send metrics to Grafana"
                  
          echo "✅ Metrics sent to Grafana successfully"
        env:
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAFANA_API_URL: ${{ secrets.GRAFANA_API_URL }}
      
      - name: Generate performance report
        run: |
          echo "=== Performance Metrics ==="
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Build: Success"
          echo "=========================="
