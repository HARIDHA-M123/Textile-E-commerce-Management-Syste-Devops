name: CI/CD Pipeline with Monitoring

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coolbros/package-lock.json
      
      - name: Install dependencies
        working-directory: ./coolbros
        run: npm ci
      
      - name: Run linting
        working-directory: ./coolbros
        run: npm run lint
      
      - name: Run tests
        working-directory: ./coolbros
        run: npm run test:coverage
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coolbros/coverage/lcov.info
          flags: frontend
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Build application
        working-directory: ./coolbros
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: coolbros/dist
          retention-days: 7

  deploy-staging:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: ./dist
      
      - name: Deploy to Netlify (Staging)
        uses: nwtgck/actions-netlify@v3
        with:
          publishDir: './dist'
          productionBranch: main
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          deployMessage: 'Deploy staging from GitHub Actions'
          enableCommitComment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_STAGING }}
        working-directory: ./

  deploy-production:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: ./dist
      
      - name: Deploy to Netlify (Production)
        uses: nwtgck/actions-netlify@v3
        with:
          publishDir: './dist'
          productionBranch: main
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          deployMessage: 'Deploy production from GitHub Actions'
          enableCommitComment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_PROD }}
        working-directory: ./

  monitoring:
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send deployment status to monitoring
        run: |
          echo "Deployment completed for commit: ${{ github.sha }}"
          echo "Environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"
          echo "Status: ${{ job.status }}"
      
      - name: Check uptime endpoint
        if: github.ref == 'refs/heads/main'
        run: |
          sleep 60
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health || echo "Health check endpoint not available"
